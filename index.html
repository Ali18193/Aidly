<style>
/* ═══════════════════════════════════════════
   ROOT & RESET
═══════════════════════════════════════════ */
:root {
  --navy:    #07192E;
  --navy2:   #0D2540;
  --blue:    #1A6FD4;
  --blue2:   #2183F0;
  --orange:  #F07B1D;
  --orange2: #FF9240;
  --teal:    #0A8F82;
  --white:   #FFFFFF;
  --off:     #F4F7FB;
  --off2:    #EBF0F8;
  --muted:   #7E95B0;
  --text:    #152035;
  --border:  #DDE5F0;
  --card:    #FFFFFF;
  --shadow:  0 4px 24px rgba(7,25,46,0.08);
  --shadow2: 0 12px 40px rgba(7,25,46,0.14);
  --r:       16px;
  --r2:      24px;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { scroll-behavior:smooth; font-size:16px; }
body {
  font-family:'Sora', sans-serif;
  background:var(--off);
  color:var(--text);
  overflow-x:hidden;
  -webkit-font-smoothing:antialiased;
}
img { display:block; max-width:100%; }
button { cursor:pointer; font-family:'Sora',sans-serif; }
a { text-decoration:none; }

/* ═══════════════════════════════════════════
   LANGUAGE SYSTEM
═══════════════════════════════════════════ */
.t { display:none; }
body.az .t-az, body.en .t-en { display:inline; }
body.az .tb-az, body.en .tb-en { display:block; }

/* ═══════════════════════════════════════════
   NAVBAR
═══════════════════════════════════════════ */
.navbar {
  position:fixed; top:0; left:0; right:0; z-index:900;
  height:64px;
  display:flex; align-items:center; justify-content:space-between;
  padding:0 24px;
  background:rgba(7,25,46,0.92);
  backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border-bottom:1px solid rgba(255,255,255,0.06);
  transition:all 0.3s;
}
.nb-logo {
  font-size:20px; font-weight:800; color:#fff;
  letter-spacing:-0.5px;
}
.nb-logo em { color:var(--orange); font-style:normal; }

.nb-center {
  display:flex; gap:28px;
}
.nb-center a {
  font-size:13px; font-weight:500;
  color:rgba(255,255,255,0.55);
  transition:color 0.2s;
}
.nb-center a:hover { color:#fff; }

.nb-right { display:flex; align-items:center; gap:12px; }

.lang-pill {
  display:flex; background:rgba(255,255,255,0.07);
  border-radius:100px; padding:3px; gap:2px;
}
.lang-pill button {
  padding:4px 12px; border-radius:100px; border:none;
  background:transparent; color:rgba(255,255,255,0.45);
  font-size:12px; font-weight:700; transition:all 0.2s;
}
.lang-pill button.on { background:var(--orange); color:#fff; }

.nb-cta {
  background:var(--orange); color:#fff;
  border:none; padding:8px 18px;
  border-radius:100px; font-size:13px; font-weight:700;
  transition:all 0.2s;
}
.nb-cta:hover { background:var(--orange2); transform:translateY(-1px); }

/* hamburger */
.ham {
  display:none; flex-direction:column; gap:5px;
  background:none; border:none; padding:4px;
  position:relative; z-index:950;
}
.ham span {
  width:22px; height:2px;
  background:rgba(255,255,255,0.7);
  border-radius:2px; display:block; transition:all 0.3s;
}

/* mobile menu */
.mob-menu {
  display:none; position:fixed; top:64px; left:0; right:0;
  background:var(--navy); z-index:950; padding:20px 24px;
  flex-direction:column; gap:4px;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.mob-menu.open { display:flex; }
.mob-menu a {
  color:rgba(255,255,255,0.7); font-size:15px;
  font-weight:500; padding:12px 0;
  border-bottom:1px solid rgba(255,255,255,0.06);
}
.mob-menu-cta {
  margin-top:8px;
  background:var(--orange); color:#fff;
  border:none; padding:13px;
  border-radius:12px; font-size:14px; font-weight:700;
  width:100%; text-align:center;
}

/* ═══════════════════════════════════════════
   HERO
═══════════════════════════════════════════ */
.hero {
  min-height:100svh;
  background:var(--navy);
  display:flex; align-items:center;
  padding:100px 24px 60px;
  position:relative; overflow:hidden;
}

/* mesh background */
.hero::before {
  content:'';
  position:absolute; inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 70% 20%, rgba(26,111,212,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 50% 50% at 10% 80%, rgba(10,143,130,0.12) 0%, transparent 55%),
    radial-gradient(ellipse 40% 40% at 90% 85%, rgba(240,123,29,0.1) 0%, transparent 50%);
  pointer-events:none;
}

/* grid lines subtle */
.hero::after {
  content:'';
  position:absolute; inset:0;
  background-image:
    linear-gradient(rgba(255,255,255,0.025) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.025) 1px, transparent 1px);
  background-size:60px 60px;
  pointer-events:none;
}

.hero-inner {
  max-width:1180px; margin:0 auto; width:100%;
  display:grid; grid-template-columns:1fr 1fr;
  gap:60px; align-items:center; position:relative; z-index:1;
}

.hero-badge {
  display:inline-flex; align-items:center; gap:8px;
  background:rgba(240,123,29,0.12);
  border:1px solid rgba(240,123,29,0.25);
  border-radius:100px; padding:6px 14px;
  font-size:11px; font-weight:700;
  color:var(--orange2); letter-spacing:1px;
  text-transform:uppercase; margin-bottom:20px;
}
.hero-badge span { font-size:14px; }

.hero-h1 {
  font-family:'Fraunces', serif;
  font-size:clamp(38px,5.5vw,72px);
  font-weight:700; color:#fff;
  line-height:1.08; margin-bottom:20px;
  letter-spacing:-1px;
}
.hero-h1 .hl {
  color:var(--orange);
  font-style:italic;
}

.hero-p {
  font-size:clamp(14px,1.5vw,17px);
  color:rgba(255,255,255,0.55);
  line-height:1.75; margin-bottom:36px;
  max-width:480px;
}

.hero-btns { display:flex; gap:12px; flex-wrap:wrap; margin-bottom:48px; }

.btn-fill {
  background:var(--orange); color:#fff;
  border:none; padding:14px 26px;
  border-radius:100px; font-size:14px; font-weight:700;
  transition:all 0.25s; display:inline-flex; align-items:center; gap:6px;
}
.btn-fill:hover { background:var(--orange2); transform:translateY(-2px); box-shadow:0 8px 24px rgba(240,123,29,0.35); }

.btn-ghost {
  background:rgba(255,255,255,0.07);
  border:1px solid rgba(255,255,255,0.15);
  color:rgba(255,255,255,0.8);
  padding:14px 26px; border-radius:100px;
  font-size:14px; font-weight:600; transition:all 0.25s;
  display:inline-flex; align-items:center; gap:6px;
}
.btn-ghost:hover { background:rgba(255,255,255,0.13); border-color:rgba(255,255,255,0.35); }

.hero-pills {
  display:flex; gap:10px; flex-wrap:wrap;
}
.pill {
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:100px; padding:8px 16px;
  font-size:12px; font-weight:600;
  color:rgba(255,255,255,0.65);
  display:flex; align-items:center; gap:6px;
}
.pill-dot { width:6px; height:6px; border-radius:50%; background:var(--teal); }

/* ═══════════════════════════════════════════
   PHONE SHOWCASE
═══════════════════════════════════════════ */
.showcase {
  display:flex; justify-content:center; align-items:center;
  position:relative;
}

/* glow behind phone */
.showcase::before {
  content:'';
  position:absolute;
  width:300px; height:300px;
  background:radial-gradient(circle, rgba(26,111,212,0.3) 0%, transparent 70%);
  border-radius:50%; z-index:0;
}

.phone-shell {
  width:272px; height:556px;
  background:#050E1A;
  border-radius:44px;
  border:2px solid rgba(255,255,255,0.12);
  overflow:hidden;
  position:relative; z-index:1;
  box-shadow:
    0 0 0 6px rgba(255,255,255,0.03),
    0 40px 80px rgba(0,0,0,0.6),
    inset 0 1px 0 rgba(255,255,255,0.08);
  animation:levitate 5s ease-in-out infinite;
}
@keyframes levitate {
  0%,100%{ transform:translateY(0) rotate(-1deg); }
  50%{ transform:translateY(-14px) rotate(1deg); }
}

.phone-island {
  position:absolute; top:10px; left:50%;
  transform:translateX(-50%);
  width:90px; height:26px;
  background:#050E1A;
  border-radius:20px; z-index:10;
  border:1.5px solid rgba(255,255,255,0.06);
}

/* ── APP SCREENS ── */
.scr {
  position:absolute; inset:0;
  opacity:0; pointer-events:none;
  transition:opacity 0.4s ease;
  display:flex; flex-direction:column;
}
.scr.on { opacity:1; pointer-events:all; }

/* ── SCREEN: HOME ── */
.scr-home {
  background:linear-gradient(170deg,#081424 0%,#0D2540 100%);
  padding:44px 18px 72px;
  overflow-y:auto;
}
.scr-home::-webkit-scrollbar { display:none; }

.sh-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:22px; }
.sh-logo { font-size:17px; font-weight:800; color:#fff; }
.sh-logo em { color:var(--orange); font-style:normal; }
.sh-av {
  width:34px; height:34px; border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  display:flex; align-items:center; justify-content:center;
  font-size:13px; color:#fff; font-weight:700;
  cursor:pointer; border:2px solid rgba(255,255,255,0.15);
  flex-shrink:0;
}

.sh-greet { font-size:10px; color:rgba(255,255,255,0.4); margin-bottom:2px; }
.sh-name { font-size:19px; font-weight:700; color:#fff; margin-bottom:18px; }

.mood-card {
  background:linear-gradient(135deg,#1A5FBE,#0D4A9A);
  border-radius:18px; padding:16px; margin-bottom:14px;
  border:1px solid rgba(255,255,255,0.1);
}
.mc-label { font-size:10px; color:rgba(255,255,255,0.6); font-weight:700; letter-spacing:.5px; text-transform:uppercase; margin-bottom:10px; }
.mc-emojis { display:flex; gap:8px; }
.mc-e {
  flex:1; background:rgba(255,255,255,0.1);
  border:1px solid rgba(255,255,255,0.15);
  border-radius:10px; padding:9px 4px;
  text-align:center; font-size:19px; cursor:pointer;
  transition:all 0.2s; -webkit-tap-highlight-color:transparent;
}
.mc-e:hover,.mc-e.on { background:rgba(255,255,255,0.25); transform:scale(1.08); }

.qa-grid { display:grid; grid-template-columns:1fr 1fr; gap:9px; margin-bottom:14px; }
.qa-c {
  background:rgba(255,255,255,0.05);
  border:1px solid rgba(255,255,255,0.07);
  border-radius:14px; padding:14px 10px;
  cursor:pointer; transition:all 0.2s; -webkit-tap-highlight-color:transparent;
}
.qa-c:hover { background:rgba(255,255,255,0.1); transform:translateY(-2px); }
.qa-ic { font-size:22px; margin-bottom:5px; }
.qa-lb { font-size:10px; color:rgba(255,255,255,0.75); font-weight:600; }

.up-card {
  background:rgba(10,143,130,0.15);
  border:1px solid rgba(10,143,130,0.25);
  border-radius:14px; padding:13px;
  display:flex; align-items:center; gap:10px;
}
.up-ic { font-size:22px; }
.up-t { font-size:11px; font-weight:700; color:#fff; }
.up-s { font-size:9px; color:rgba(255,255,255,0.45); margin-top:2px; }

/* ── SCREEN: TEST ── */
.scr-test {
  background:var(--off);
  padding:44px 18px 72px;
  overflow-y:auto;
}
.scr-test::-webkit-scrollbar { display:none; }

.st-back { font-size:20px; cursor:pointer; color:var(--text); margin-bottom:14px; display:inline-block; }
.st-title { font-size:15px; font-weight:800; color:var(--text); }
.st-sub { font-size:10px; color:var(--muted); margin-top:2px; margin-bottom:14px; }

.prog-wrap { background:var(--border); border-radius:100px; height:5px; margin-bottom:22px; overflow:hidden; }
.prog-fill { height:100%; border-radius:100px; background:linear-gradient(90deg,var(--blue),var(--blue2)); width:60%; transition:width 0.4s; }

.st-q { font-size:13px; font-weight:700; color:var(--text); line-height:1.55; margin-bottom:16px; }

.st-opts { display:flex; flex-direction:column; gap:8px; }
.st-o {
  background:#fff; border:1.5px solid var(--border);
  border-radius:12px; padding:12px 14px;
  font-size:12px; font-weight:500; color:var(--text);
  cursor:pointer; transition:all 0.2s; -webkit-tap-highlight-color:transparent;
  text-align:left;
}
.st-o:hover { border-color:var(--blue); color:var(--blue); }
.st-o.on { border-color:var(--blue); background:rgba(26,111,212,0.06); color:var(--blue); font-weight:700; }

.st-next {
  margin-top:18px; width:100%;
  background:linear-gradient(135deg,var(--blue),var(--blue2));
  color:#fff; border:none;
  padding:14px; border-radius:14px;
  font-size:13px; font-weight:700;
  transition:all 0.2s; box-shadow:0 4px 16px rgba(26,111,212,0.3);
}
.st-next:hover { transform:translateY(-1px); box-shadow:0 8px 24px rgba(26,111,212,0.35); }

/* ── SCREEN: PSYCHOLOGISTS ── */
.scr-psy {
  background:var(--off);
  padding:44px 18px 72px;
  overflow-y:auto;
}
.scr-psy::-webkit-scrollbar { display:none; }

.sp-head { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
.sp-title { font-size:15px; font-weight:800; color:var(--text); }
.sp-filt { font-size:11px; color:var(--blue); font-weight:700; cursor:pointer; }

.sp-search {
  background:#fff; border:1.5px solid var(--border);
  border-radius:12px; padding:10px 14px;
  font-size:12px; color:var(--muted);
  display:flex; align-items:center; gap:8px;
  margin-bottom:14px;
}

.psy-c {
  background:#fff; border-radius:16px;
  padding:14px; margin-bottom:10px;
  display:flex; gap:11px; align-items:flex-start;
  box-shadow:0 2px 12px rgba(7,25,46,0.06);
  cursor:pointer; transition:all 0.2s; -webkit-tap-highlight-color:transparent;
}
.psy-c:hover { transform:translateY(-2px); box-shadow:0 6px 20px rgba(7,25,46,0.1); }
.psy-av {
  width:44px; height:44px; border-radius:14px;
  display:flex; align-items:center; justify-content:center;
  font-size:22px; flex-shrink:0;
}
.psy-name { font-size:12px; font-weight:700; color:var(--text); }
.psy-spec { font-size:10px; color:var(--muted); margin-top:1px; }
.psy-meta { display:flex; gap:8px; margin-top:6px; align-items:center; }
.psy-star { font-size:11px; color:var(--orange); font-weight:700; }
.psy-price { font-size:10px; color:var(--muted); }
.psy-btn {
  margin-left:auto; align-self:center; flex-shrink:0;
  background:var(--blue); color:#fff; border:none;
  border-radius:10px; padding:7px 13px;
  font-size:10px; font-weight:700;
  transition:all 0.2s;
}
.psy-btn:hover { background:var(--blue2); }

/* ── SCREEN: PROFILE ── */
.scr-prof {
  background:var(--off);
  padding:44px 18px 72px;
  overflow-y:auto;
}
.scr-prof::-webkit-scrollbar { display:none; }

.prof-header {
  background:linear-gradient(135deg,var(--navy),var(--navy2));
  border-radius:18px; padding:20px 16px;
  text-align:center; margin-bottom:16px;
  position:relative; overflow:hidden;
}
.prof-header::before {
  content:'';
  position:absolute; inset:0;
  background:radial-gradient(ellipse at 50% 0%, rgba(26,111,212,0.3) 0%, transparent 70%);
}
.prof-av-big {
  width:64px; height:64px; border-radius:50%;
  background:linear-gradient(135deg,var(--blue),var(--teal));
  display:flex; align-items:center; justify-content:center;
  font-size:26px; color:#fff; font-weight:700;
  margin:0 auto 10px; position:relative; z-index:1;
  border:3px solid rgba(255,255,255,0.2);
}
.prof-name-big { font-size:16px; font-weight:700; color:#fff; position:relative; z-index:1; }
.prof-email { font-size:11px; color:rgba(255,255,255,0.45); margin-top:3px; position:relative; z-index:1; }

.prof-badge-row { display:flex; gap:8px; justify-content:center; margin-top:14px; position:relative; z-index:1; }
.prof-badge {
  background:rgba(255,255,255,0.1); border:1px solid rgba(255,255,255,0.15);
  border-radius:100px; padding:5px 12px;
  font-size:10px; color:rgba(255,255,255,0.75); font-weight:600;
  display:flex; align-items:center; gap:5px;
}

.prof-section-title { font-size:11px; font-weight:700; color:var(--muted); letter-spacing:1px; text-transform:uppercase; margin-bottom:8px; margin-top:16px; }

.prof-row {
  background:#fff; border-radius:14px;
  overflow:hidden; margin-bottom:8px;
  box-shadow:0 2px 8px rgba(7,25,46,0.05);
}
.prof-item {
  display:flex; align-items:center; gap:12px;
  padding:13px 16px;
  border-bottom:1px solid var(--off);
  cursor:pointer; transition:background 0.2s;
  -webkit-tap-highlight-color:transparent;
}
.prof-item:last-child { border-bottom:none; }
.prof-item:hover { background:var(--off); }
.prof-item-ic { font-size:18px; width:32px; text-align:center; flex-shrink:0; }
.prof-item-txt { flex:1; }
.prof-item-name { font-size:13px; font-weight:600; color:var(--text); }
.prof-item-sub { font-size:10px; color:var(--muted); margin-top:1px; }
.prof-item-arr { color:var(--muted); font-size:14px; }
.prof-item-badge {
  background:var(--blue); color:#fff;
  border-radius:100px; font-size:9px; font-weight:700;
  padding:2px 8px;
}

.prof-logout {
  width:100%; background:rgba(239,68,68,0.08);
  border:1.5px solid rgba(239,68,68,0.2);
  color:#EF4444; border-radius:14px;
  padding:13px; font-size:13px; font-weight:700;
  margin-top:12px; transition:all 0.2s;
}
.prof-logout:hover { background:rgba(239,68,68,0.15); }

/* ── BOTTOM NAV ── */
.app-bnav {
  position:absolute; bottom:0; left:0; right:0; z-index:5;
  display:flex; padding:8px 0 14px;
  border-top:1px solid;
}
.scr-home .app-bnav { background:rgba(8,20,36,0.95); border-color:rgba(255,255,255,0.07); backdrop-filter:blur(10px); }
.scr-test .app-bnav,.scr-psy .app-bnav,.scr-prof .app-bnav {
  background:rgba(244,247,251,0.96); border-color:rgba(0,0,0,0.07); backdrop-filter:blur(10px);
}

.bnav-i {
  flex:1; display:flex; flex-direction:column;
  align-items:center; gap:3px; cursor:pointer;
  transition:all 0.2s; padding:4px 0;
  -webkit-tap-highlight-color:transparent;
}
.bnav-ic { font-size:18px; }
